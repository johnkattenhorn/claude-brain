services:
  brain-mcp:
    build: .
    container_name: brain-mcp
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "3008:3008"   # MCP SSE
      - "3009:3009"   # Health endpoint
    volumes:
      # Mount brain git repo
      - brain-repo:/data/brain-repo
      # Mount claude config dir
      - claude-config:/data/claude
      # Mount plugin scripts for trigger_sync tool
      - ../:/app/plugin:ro
    environment:
      - TZ=Europe/London
      - MCP_PORT=3008
      - BRAIN_REPO=/data/brain-repo
      - CLAUDE_DIR=/data/claude
      - CLAUDE_PLUGIN_ROOT=/app/plugin
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3009/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - proxy

volumes:
  brain-repo:
  claude-config:

networks:
  proxy:
    external: true
